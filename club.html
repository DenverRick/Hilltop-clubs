<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Club — Hilltop Clubs</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1><a href="/">Hilltop Clubs</a></h1>
  </header>

  <main>
    <a class="back-button" href="/">← All clubs</a>
    <article class="club-detail" id="detail">
      <div class="loading">Loading…</div>
    </article>
  </main>

  <footer class="site-footer">Hilltop at Inspiration · Aurora, CO</footer>

  <script src="/api-client.js"></script>
  <script>
    const $ = (sel) => document.querySelector(sel);
    const escape = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    // Same path-fallback as category.html — supports both ?slug= and /club/:slug
    // even when the static preview doesn't apply Netlify's redirect rewrite.
    const params = new URLSearchParams(location.search);
    const pathLeaf = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const fromPath = (pathLeaf && pathLeaf !== 'club.html') ? pathLeaf : '';
    const slug = params.get('slug') || fromPath;
    const detail = $('#detail');

    // Airtable URL fields sometimes hold bare hostnames like "example.org" with no
    // scheme; the browser would then treat them as relative paths. Force an https
    // prefix unless the value already has one (or is mailto:/tel:).
    function externalUrl(url) {
      const v = String(url || '').trim();
      if (!v) return '';
      return /^(https?:|mailto:|tel:)/i.test(v) ? v : `https://${v}`;
    }

    function youtubeId(url) {
      try {
        const u = new URL(url);
        if (u.hostname === 'youtu.be') return u.pathname.slice(1);
        if (u.hostname.includes('youtube.com')) {
          if (u.pathname === '/watch') return u.searchParams.get('v');
          if (u.pathname.startsWith('/embed/')) return u.pathname.split('/')[2];
          if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2];
        }
      } catch {}
      return null;
    }

    async function onInterestClick(ev) {
      ev.preventDefault();
      const btn = ev.currentTarget;
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Opening email…';
      try {
        const { mailto } = await ClubsAPI.getClubMailto(slug);
        window.location.href = mailto;
        // Restore label after a beat in case the mail handoff bounces back.
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
      } catch (err) {
        btn.textContent = original;
        btn.disabled = false;
        alert('Could not open email: ' + err.message);
      }
    }

    async function load() {
      if (!slug) {
        detail.innerHTML = '<div class="error">Missing club.</div>';
        return;
      }
      try {
        const [{ club }, { categories }] = await Promise.all([
          ClubsAPI.getClub(slug),
          ClubsAPI.getCategories(),
        ]);
        const cat = categories.find((c) => c.name === club.category);
        document.title = `${club.name} — Hilltop Clubs`;

        // If the leader filled in the free-text "Meeting Schedule" override
        // (e.g. "3rd Wednesday of each month"), show one wider "When" cell
        // instead of the structured Frequency + Day pair.
        const scheduleCells = club.meetingSchedule
          ? [['📅', 'When', club.meetingSchedule]]
          : [
              ['📅', 'Frequency', club.meetingFrequency],
              ['🗓', 'Day',       club.meetingDay],
            ];
        const meetingCells = [
          ...scheduleCells,
          ['🕐', 'Time',     club.meetingTime],
          ['📍', 'Location', club.meetingLocation],
        ].filter(([, , v]) => v);

        const videos = (club.youtubeUrls || []).map(youtubeId).filter(Boolean);
        const catHref = cat ? `/category/${encodeURIComponent(cat.slug)}` : '#';

        detail.innerHTML = `
          ${club.thumbnail ? `<img class="club-banner" src="${escape(club.thumbnail)}" alt="" />` : ''}
          <div class="club-body">
            ${club.category ? `<div class="club-eyebrow"><a href="${escape(catHref)}">${escape(club.category)}</a></div>` : ''}
            <h2>${escape(club.name)}</h2>
            ${club.blurb ? `<p class="club-blurb">${escape(club.blurb)}</p>` : ''}

            ${meetingCells.length ? `
              <div class="meeting-strip">
                ${meetingCells.map(([icon, label, value]) => `
                  <div class="meeting-cell">
                    <div class="label"><span aria-hidden="true">${icon}</span>${escape(label)}</div>
                    <div class="value">${escape(value)}</div>
                  </div>
                `).join('')}
              </div>` : ''}

            ${club.description ? `<div class="club-description">${escape(club.description).replace(/\n/g, '<br>')}</div>` : ''}
            ${club.vibe ? `<div class="vibe">${escape(club.vibe)}</div>` : ''}

            ${videos.length ? `
              <div class="video-grid ${videos.length > 1 ? 'has-multiple' : ''}">
                ${videos.map((id) => `<iframe src="https://www.youtube.com/embed/${escape(id)}" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`).join('')}
              </div>` : ''}

            <div class="club-footer">
              <div class="club-footer-meta">
                ${club.leaderName ? `<div>Led by <strong>${escape(club.leaderName)}</strong></div>` : ''}
                ${club.memberCount != null ? `<div><strong>${escape(club.memberCount)}</strong> members</div>` : ''}
                ${club.teamReach ? `<div title="Group code for the TeamReach app">TeamReach code <strong>${escape(club.teamReach)}</strong></div>` : ''}
                ${(club.tags && club.tags.length) ? `<div class="tags">${club.tags.map((t) => `<span class="tag">${escape(t)}</span>`).join('')}</div>` : ''}
              </div>
              <div class="club-footer-actions">
                <button class="btn btn-primary" id="interest-btn" type="button">I'm interested</button>
                ${club.website ? `<a class="btn btn-secondary" href="${escape(externalUrl(club.website))}" target="_blank" rel="noopener">Visit website</a>` : ''}
              </div>
            </div>
          </div>
        `;
        $('#interest-btn').addEventListener('click', onInterestClick);
      } catch (err) {
        detail.innerHTML = `<div class="error">${escape(err.message)}</div>`;
      }
    }
    load();
  </script>
</body>
</html>
