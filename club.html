<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#1d5fa8" />
  <meta name="apple-mobile-web-app-title" content="Hilltop Clubs" />
  <title>Club — Hilltop Clubs</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1><a href="/">Hilltop Clubs</a></h1>
  </header>

  <main>
    <a class="back-button" href="/">← All clubs</a>
    <article class="club-detail" id="detail">
      <div class="loading">Loading…</div>
    </article>
  </main>

  <footer class="site-footer">
    Hilltop at Inspiration · Aurora, CO ·
    <a class="footer-link" href="mailto:miles.rick@gmail.com?subject=Hilltop%20Clubs%20Directory%20%E2%80%94%20Suggestion%20or%20correction&body=Hi%20Rick%2C%0A%0A">Suggest a club or report a correction</a>
  </footer>

  <script src="/api-client.js"></script>
  <script>
    const $ = (sel) => document.querySelector(sel);
    const escape = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    // Same path-fallback as category.html — supports both ?slug= and /club/:slug
    // even when the static preview doesn't apply Netlify's redirect rewrite.
    const params = new URLSearchParams(location.search);
    const pathLeaf = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const fromPath = (pathLeaf && pathLeaf !== 'club.html') ? pathLeaf : '';
    const slug = params.get('slug') || fromPath;
    const detail = $('#detail');

    // Senior Geeks Club gets the dynamic "lightbulb hero": a branded banner that
    // shows the next upcoming presentation (label + title + speaker), pulled from
    // the Senior Geeks Airtable base via /api/get-senior-geeks-next. Renders its
    // static fallback first, then fills in the speaker; any fetch failure keeps
    // the fallback. Purely additive — only mounts for this one club.
    const SENIOR_GEEKS_SLUG = 'senior-geeks';

    function mountSeniorGeeksHero() {
      const hero = document.createElement('section');
      hero.className = 'hero sg-hero';
      hero.innerHTML = `
        <div class="hero-content">
          <div class="hero-lightbulb">
            <svg viewBox="0 0 64 64" role="img" aria-label="Lightbulb">
              <defs>
                <radialGradient id="bulbGlow" cx="50%" cy="42%" r="55%">
                  <stop offset="0%" stop-color="#fef3c7"/>
                  <stop offset="55%" stop-color="#f59e0b"/>
                  <stop offset="100%" stop-color="#d97706"/>
                </radialGradient>
              </defs>
              <g stroke="#fcd34d" stroke-width="3" stroke-linecap="round">
                <line x1="32" y1="2" x2="32" y2="10"/>
                <line x1="9" y1="13" x2="14" y2="18"/>
                <line x1="55" y1="13" x2="50" y2="18"/>
                <line x1="2" y1="34" x2="10" y2="34"/>
                <line x1="62" y1="34" x2="54" y2="34"/>
              </g>
              <path fill="url(#bulbGlow)" d="M32 12a17 17 0 0 0-10 30c2 1.5 3 3.6 3 6v2h14v-2c0-2.4 1-4.5 3-6A17 17 0 0 0 32 12z"/>
              <path fill="none" stroke="#92400e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" d="M27 30l5 5 5-5M32 35v9"/>
              <g fill="#cbd5e1">
                <rect x="25" y="50" width="14" height="4" rx="1.5"/>
                <rect x="27" y="55" width="10" height="3.5" rx="1.5"/>
                <rect x="29" y="59" width="6" height="3" rx="1.5"/>
              </g>
            </svg>
          </div>
          <h1>Senior Geeks Club</h1>
          <p class="hero-tagline">Bright ideas in science &amp; technology</p>
          <div class="hero-speaker-slot">
            <p class="hero-speaker hero-speaker--empty">New presentations announced monthly — check back soon.</p>
          </div>
        </div>`;
      detail.parentNode.insertBefore(hero, detail);
      populateSeniorGeeksHero(hero.querySelector('.hero-speaker-slot'));
    }

    async function populateSeniorGeeksHero(slot) {
      try {
        const { next } = await ClubsAPI.getSeniorGeeksNext();
        if (!next || !next.title) return; // no upcoming talk — keep the fallback line
        const label = `Next up${next.dateLabel ? ` · ${next.dateLabel}` : ''}`;
        slot.innerHTML = `
          <p class="hero-speaker">
            <span class="hero-speaker__label">${escape(label)}</span>
            <span class="hero-speaker__title">${escape(next.title)}</span>
            ${next.speaker ? `<span class="hero-speaker__name">with ${escape(next.speaker)}</span>` : ''}
          </p>`;
      } catch { /* keep the static fallback */ }
    }

    // Airtable URL fields sometimes hold bare hostnames like "example.org" with no
    // scheme; the browser would then treat them as relative paths. Force an https
    // prefix unless the value already has one (or is mailto:/tel:).
    function externalUrl(url) {
      const v = String(url || '').trim();
      if (!v) return '';
      return /^(https?:|mailto:|tel:)/i.test(v) ? v : `https://${v}`;
    }

    // Airtable rich-text fields (Long Description, blurb, etc.) serialize their
    // formatting as Markdown, which would otherwise show literal "**bold**" on
    // the page. Render a safe subset to HTML: escape first so any raw HTML the
    // leader typed stays inert, then convert headings, bold, italic, links, and
    // bullet/number lists. Only http(s)/mailto links are allowed through. A
    // single-paragraph value returns inline (no <p>) so it drops cleanly into
    // existing inline containers like the blurb and announcement banner.
    function renderMarkdown(src) {
      const raw = String(src ?? '').replace(/\r\n/g, '\n').trim();
      if (!raw) return '';

      const inline = (s) => {
        let h = escape(s);
        h = h.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, label, url) => {
          const href = externalUrl(url.replace(/&amp;/g, '&'));
          return /^(https?:|mailto:)/i.test(href)
            ? `<a href="${escape(href)}" target="_blank" rel="noopener">${label}</a>` : label;
        });
        h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        h = h.replace(/(^|[^\w*])\*([^\s*][^*]*?)\*/g, '$1<em>$2</em>');
        h = h.replace(/(^|[^\w_])_([^\s_][^_]*?)_(?=$|[^\w_])/g, '$1<em>$2</em>');
        h = h.replace(/(^|[\s(])((?:https?:\/\/|www\.)[^\s<)]+)/gi,
          (m, pre, url) => `${pre}<a href="${escape(externalUrl(url))}" target="_blank" rel="noopener">${url}</a>`);
        return h;
      };

      const out = [];
      let para = [], list = null;
      const flushPara = () => { if (para.length) { out.push(`<p>${para.map(inline).join('<br>')}</p>`); para = []; } };
      const flushList = () => {
        if (list) { out.push(`<${list.tag}>${list.items.map((i) => `<li>${inline(i)}</li>`).join('')}</${list.tag}>`); list = null; }
      };

      for (const line of raw.split('\n')) {
        const t = line.trim();
        const heading = t.match(/^(#{1,6})\s+(.*)$/);
        const bullet = t.match(/^[-*]\s+(.*)$/);
        const numbered = t.match(/^\d+\.\s+(.*)$/);
        if (heading) {
          flushPara(); flushList();
          out.push(`<h${Math.min(heading[1].length + 2, 6)}>${inline(heading[2])}</h${Math.min(heading[1].length + 2, 6)}>`);
        } else if (bullet) {
          flushPara();
          if (!list || list.tag !== 'ul') { flushList(); list = { tag: 'ul', items: [] }; }
          list.items.push(bullet[1]);
        } else if (numbered) {
          flushPara();
          if (!list || list.tag !== 'ol') { flushList(); list = { tag: 'ol', items: [] }; }
          list.items.push(numbered[1]);
        } else if (t === '') {
          flushPara(); flushList();
        } else {
          flushList(); para.push(t);
        }
      }
      flushPara(); flushList();

      const single = out.length === 1 && out[0].startsWith('<p>') && out[0].endsWith('</p>');
      return single ? out[0].slice(3, -4) : out.join('');
    }

    function youtubeId(url) {
      try {
        const u = new URL(url);
        if (u.hostname === 'youtu.be') return u.pathname.slice(1);
        if (u.hostname.includes('youtube.com')) {
          if (u.pathname === '/watch') return u.searchParams.get('v');
          if (u.pathname.startsWith('/embed/')) return u.pathname.split('/')[2];
          if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2];
        }
      } catch {}
      return null;
    }

    async function onInterestClick(ev) {
      ev.preventDefault();
      const btn = ev.currentTarget;
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Opening email…';
      try {
        const { mailto } = await ClubsAPI.getClubMailto(slug);
        window.location.href = mailto;
        // Restore label after a beat in case the mail handoff bounces back.
        setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
      } catch (err) {
        btn.textContent = original;
        btn.disabled = false;
        alert('Could not open email: ' + err.message);
      }
    }

    async function load() {
      if (!slug) {
        detail.innerHTML = '<div class="error">Missing club.</div>';
        return;
      }
      try {
        // getClubEvents may fail silently (e.g. no MeetingSlots set up for
        // this club yet) — fall back to empty list rather than failing the
        // whole page. The section just hides itself.
        const [{ club }, { categories }, eventsRes] = await Promise.all([
          ClubsAPI.getClub(slug),
          ClubsAPI.getCategories(),
          ClubsAPI.getClubEvents(slug).catch(() => ({ events: [] })),
        ]);
        const upcomingEvents = eventsRes?.events || [];
        const cat = categories.find((c) => c.name === club.category);
        document.title = `${club.name} — Hilltop Clubs`;

        // If the leader filled in the free-text "Meeting Schedule" override
        // (e.g. "3rd Wednesday of each month"), show one wider "When" cell
        // instead of the structured Frequency + Day pair.
        const scheduleCells = club.meetingSchedule
          ? [['📅', 'When', club.meetingSchedule]]
          : [
              ['📅', 'Frequency', club.meetingFrequency],
              ['🗓', 'Day',       club.meetingDay],
            ];
        const meetingCells = [
          ...scheduleCells,
          ['🕐', 'Time',     club.meetingTime],
          ['📍', 'Location', club.meetingLocation],
        ].filter(([, , v]) => v);

        const videos = (club.youtubeUrls || []).map(youtubeId).filter(Boolean);
        const catHref = cat ? `/category/${encodeURIComponent(cat.slug)}` : '#';

        // On the Senior Geeks page the lightbulb hero is the page header, so
        // suppress the duplicate photo banner + club name/eyebrow below it.
        const isSeniorGeeks = slug === SENIOR_GEEKS_SLUG;
        detail.innerHTML = `
          ${(club.thumbnail && !isSeniorGeeks) ? `<img class="club-banner" src="${escape(club.thumbnail)}" alt="" />` : ''}
          <div class="club-body">
            ${(club.category && !isSeniorGeeks) ? `<div class="club-eyebrow"><a href="${escape(catHref)}">${escape(club.category)}</a></div>` : ''}
            ${isSeniorGeeks ? '' : `<h2>${escape(club.name)}</h2>`}
            ${(club.announcementActive && club.announcement) ? `<div class="announcement announcement-detail">📢 ${renderMarkdown(club.announcement)}</div>` : ''}
            ${club.blurb ? `<p class="club-blurb">${renderMarkdown(club.blurb)}</p>` : ''}

            ${meetingCells.length ? `
              <div class="meeting-strip">
                ${meetingCells.map(([icon, label, value]) => `
                  <div class="meeting-cell">
                    <div class="label"><span aria-hidden="true">${icon}</span>${escape(label)}</div>
                    <div class="value">${escape(value)}</div>
                  </div>
                `).join('')}
              </div>` : ''}

            ${upcomingEvents.length ? `
              <div class="upcoming-meetings">
                <div class="upcoming-label">📅 Upcoming meetings</div>
                <ul class="upcoming-list">
                  ${upcomingEvents.map((ev) => `
                    <li>
                      <span class="upcoming-date">${escape(ev.dayLabel)}</span>
                      ${ev.startTime ? `<span class="upcoming-time">${escape(ev.startTime)}${ev.endTime ? ` – ${escape(ev.endTime)}` : ''}</span>` : ''}
                      ${ev.location ? `<span class="upcoming-location">${escape(ev.location)}</span>` : ''}
                      ${ev.note ? `<span class="upcoming-note">${escape(ev.note)}</span>` : ''}
                    </li>
                  `).join('')}
                </ul>
              </div>` : ''}

            ${club.description ? `<div class="club-description">${renderMarkdown(club.description)}</div>` : ''}
            ${club.vibe ? `<div class="vibe">${escape(club.vibe)}</div>` : ''}
            ${club.whatToBring ? `<div class="what-to-bring"><div class="wtb-label">👋 First time? Bring this:</div><div class="wtb-text">${renderMarkdown(club.whatToBring)}</div></div>` : ''}

            ${videos.length ? `
              <div class="video-grid ${videos.length > 1 ? 'has-multiple' : ''}">
                ${videos.map((id) => `<iframe src="https://www.youtube.com/embed/${escape(id)}" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`).join('')}
              </div>` : ''}

            ${club.promoFlyer ? `
              <div class="promo-flyer">
                <div class="promo-flyer-label">📣 Latest from ${escape(club.name)}</div>
                <a class="promo-flyer-link" href="${escape(club.promoFlyer)}" target="_blank" rel="noopener">
                  <img class="promo-flyer-image" src="${escape(club.promoFlyerLarge || club.promoFlyer)}" alt="Promotional flyer for ${escape(club.name)}" />
                </a>
              </div>` : ''}

            <div class="club-footer">
              <div class="club-footer-meta">
                ${club.leaderName ? `<div>Led by <strong>${escape(club.leaderName)}</strong></div>` : ''}
                ${club.memberCount != null ? `<div><strong>${escape(club.memberCount)}</strong> members</div>` : ''}
                ${club.teamReach ? `<div title="Group code for the TeamReach app">TeamReach code <strong>${escape(club.teamReach)}</strong></div>` : ''}
                ${(club.tags && club.tags.length) ? `<div class="tags">${club.tags.map((t) => `<span class="tag">${escape(t)}</span>`).join('')}</div>` : ''}
              </div>
              <div class="club-footer-actions">
                <button class="btn btn-primary" id="interest-btn" type="button">I'm interested</button>
                ${club.website ? `<a class="btn btn-secondary" href="${escape(externalUrl(club.website))}" target="_blank" rel="noopener">Visit website</a>` : ''}
              </div>
              <p class="contact-note">Opens a ready-to-send message in your own email app.</p>
            </div>
          </div>
        `;
        $('#interest-btn').addEventListener('click', onInterestClick);
      } catch (err) {
        detail.innerHTML = `<div class="error">${escape(err.message)}</div>`;
      }
    }
    if (slug === SENIOR_GEEKS_SLUG) mountSeniorGeeksHero();
    load();
  </script>
</body>
</html>
